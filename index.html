<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Neha & Prajwal — Wedding Invitation (Book)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Cormorant+SC:wght@300;400;500;600&family=Pinyon+Script&family=Italianno&display=swap" rel="stylesheet" />
<meta name="ext-resource-dependency" content="assets/couple.jpg" data-resource-id="coupleImg" />
<style>
  :root {
    --cream: #fdf6f0;
    --cream-deep: #f7e9df;
    --blush-light: #f6d6d6;
    --blush: #e8b4b8;
    --rose: #c97d8e;
    --rose-deep: #a85267;
    --wine: #5b2334;
    --wine-deep: #3a1620;
    --gold: #c9a96e;
    /* CONTRAST FIX: darker gold for small text (was #8a7548) */
    --gold-ink: #6f5526;
    --gold-light: #e7d3a8;
    --ink: #3d1f28;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 20% 0%, #fbe4dc 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, #f5d4d4 0%, transparent 55%),
      linear-gradient(180deg, #fdf6f0 0%, #f9ebe5 50%, #fdf6f0 100%);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Ambient floating hearts/petals layer */
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .ambient .float {
    position: absolute;
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(20px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.5; }
    50%  { opacity: 0.45; }
    90%  { opacity: 0.35; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  #app { position: relative; z-index: 2; }

  /* ============= BOOK STAGE ============= */
  .book-stage {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 14px 132px;
    perspective: 1800px;
    -webkit-perspective: 1800px;
  }

  .book {
    position: relative;
    width: min(90vw, 384px);
    height: clamp(480px, calc(100svh - 172px), 662px);
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
  }

  /* Paper-stack edge illusion under all pages */
  .book-base {
    position: absolute;
    inset: 0;
    border-radius: 6px 14px 14px 6px;
    background:
      repeating-linear-gradient(90deg, #efdcc8 0 1px, #fdf6f0 1px 3px);
    box-shadow:
      0 30px 60px -20px rgba(91,35,52,0.4),
      0 12px 28px -12px rgba(91,35,52,0.3);
    transform: translateZ(-2px) translateX(3px) translateY(2px);
    -webkit-transform: translateZ(-2px) translateX(3px) translateY(2px);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }

  /* ============= PAGE ============= */
  .page {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transition: transform .95s cubic-bezier(.62,.04,.3,1);
    border-radius: 6px 14px 14px 6px;
    cursor: pointer;
  }
  .page.flipped {
    transform: rotateY(-180deg);
    -webkit-transform: rotateY(-180deg);
    pointer-events: none;
  }

  .page-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    border-radius: inherit;
    background: linear-gradient(180deg, #fdf6f0 0%, #faeee4 100%);
    box-shadow:
      inset 0 0 0 1px rgba(201,169,110,0.25),
      inset 12px 0 24px -16px rgba(91,35,52,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 24px;
    text-align: center;
  }
  /* back of a turned page (visible mid-turn) */
  .page-back {
    transform: rotateY(180deg) translateZ(0);
    -webkit-transform: rotateY(180deg) translateZ(0);
    background: radial-gradient(circle at 50% 42%, #fdf6f0 0%, #f7e9df 68%, #f1ddd0 100%);
  }
  .page-back::before {
    content: '';
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(201,169,110,0.45);
    border-radius: 4px;
    pointer-events: none;
  }
  .page-back::after {
    content: 'N \2665 P';
    font-family: 'Pinyon Script', cursive;
    font-size: 38px;
    letter-spacing: 2px;
    color: rgba(168,82,103,0.42);
  }

  /* content wrapper that auto-fits inside the frame */
  .page-content {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transform-origin: center center;
  }

  /* gold double frame on every content page */
  .page-frame {
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(201,169,110,0.55);
    border-radius: 4px;
    pointer-events: none;
  }
  .page-frame::after {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(201,169,110,0.22);
    border-radius: 2px;
  }

  .corner-floral {
    position: absolute;
    width: 56px;
    height: 56px;
    opacity: 0.75;
    pointer-events: none;
  }
  .corner-floral.tl { top: 6px; left: 6px; }
  .corner-floral.tr { top: 6px; right: 6px; transform: scaleX(-1); }
  .corner-floral.bl { bottom: 6px; left: 6px; transform: scaleY(-1); }
  .corner-floral.br { bottom: 6px; right: 6px; transform: scale(-1,-1); }

  .torana {
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 76%;
    max-width: 300px;
    height: 34px;
    opacity: 0.85;
  }

  /* ============= COVER (page 0) ============= */
  .cover-face {
    background:
      radial-gradient(ellipse at 30% 20%, #7a3349 0%, transparent 60%),
      linear-gradient(160deg, #6b2a3e 0%, #5b2334 55%, #471a28 100%);
    box-shadow:
      inset 0 0 0 1px rgba(201,169,110,0.4),
      inset 0 0 60px rgba(0,0,0,0.25);
  }
  .cover-frame {
    position: absolute;
    inset: 14px;
    border: 1.5px solid rgba(201,169,110,0.8);
    border-radius: 4px;
    pointer-events: none;
  }
  .cover-frame::after {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(201,169,110,0.4);
    border-radius: 2px;
  }
  .cover-eyebrow {
    font-family: 'Cormorant SC', serif;
    font-size: 14px;
    letter-spacing: 0.45em;
    color: var(--gold-light);
    margin-bottom: 6px;
  }
  .cover-names {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(46px, 12vw, 58px);
    line-height: 1.15;
    color: #f3e3c2;
    text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    margin: 6px 0;
  }
  .cover-amp {
    font-family: 'Italianno', cursive;
    font-size: 54px;
    color: var(--gold);
    line-height: 0.7;
    display: block;
  }
  .cover-date {
    font-family: 'Cormorant SC', serif;
    font-size: 15px;
    letter-spacing: 0.4em;
    color: var(--gold-light);
    margin-top: 10px;
  }
  .cover-rule {
    width: 70px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
    margin: 16px auto;
  }
  .cover-open-label {
    font-family: 'Cormorant SC', serif;
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--gold-light);
    margin-top: 22px;
    animation: nudge 1.8s ease-in-out infinite;
  }

  @keyframes nudge {
    0%, 100% { transform: translateY(0); opacity: 0.75; }
    50%      { transform: translateY(-3px); opacity: 1; }
  }

  /* wax seal reused on cover as the open button */
  .wax-seal {
    position: relative;
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #c97d8e 0%, #a85267 45%, #7d2f44 100%);
    box-shadow:
      0 6px 14px rgba(0,0,0,0.5),
      inset 0 -4px 8px rgba(0,0,0,0.25),
      inset 0 4px 6px rgba(255,255,255,0.2);
    display: grid;
    place-items: center;
    line-height: 1;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #f5d4d4;
    font-size: 34px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    margin: 18px auto 0;
    animation: sealPulse 1.8s ease-in-out infinite;
    border: none;
    cursor: pointer;
  }
  .cover-seal { margin: 14px auto 6px; }

  /* N ♥ P monogram — elegant serif caps, evenly spaced, no swash overlap.
     Flex-centered both axes so it sits dead-center in the wax circle. */
  .seal-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    line-height: 1;
    font-weight: 600;
    letter-spacing: 0;
    transform: translateY(-0.02em);
  }
  .seal-heart {
    font-size: 0.62em;
    transform: translateY(0.02em);
  }

  .wax-seal::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px solid rgba(245,212,212,0.4);
  }
  .wax-seal::after {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,180,184,0.4) 0%, rgba(232,180,184,0) 65%);
    z-index: -1;
    animation: sealHalo 1.8s ease-in-out infinite;
  }
  @keyframes sealPulse {
    0%, 100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-4px) scale(1.06); }
  }
  @keyframes sealHalo {
    0%, 100% { opacity: 0.5; transform: scale(0.9); }
    50%      { opacity: 1;   transform: scale(1.15); }
  }

  /* ============= CONTENT TYPOGRAPHY (contrast-fixed) ============= */
  .eyebrow {
    font-family: 'Cormorant SC', serif;
    font-size: 14px;             /* was 10-11px */
    letter-spacing: 0.4em;
    color: var(--gold-ink);      /* darker gold */
  }
  .script-heading {
    font-family: 'Pinyon Script', cursive;
    font-size: 40px;
    color: var(--wine);          /* was rose-deep — darker now */
    line-height: 1.1;
    margin: 8px 0 2px;
  }
  .body-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;             /* was 13-15px */
    font-style: italic;
    line-height: 1.6;
    color: var(--ink);
    margin: 10px 6px;
    text-wrap: pretty;
  }
  .names-big {
    font-family: 'Pinyon Script', cursive;
    color: var(--wine);
    line-height: 1.05;
    margin: 12px 0 6px;
  }
  .names-big .first, .names-big .second { font-size: clamp(44px, 11vw, 56px); display: block; }
  .names-big .amp {
    font-family: 'Italianno', cursive;
    font-size: clamp(56px, 13vw, 70px);
    color: var(--rose-deep);
    display: block;
    line-height: 0.6;
    margin: -4px 0;
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 14px 0;
  }
  .ornament-line {
    height: 1px;
    width: 56px;
    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
  }
  .ornament-diamond {
    width: 7px;
    height: 7px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .date-day {
    font-family: 'Cormorant SC', serif;
    font-size: 15px;             /* bigger */
    letter-spacing: 0.4em;
    color: var(--wine);          /* darker than rose */
  }
  .date-number {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 52px;
    line-height: 1;
    color: var(--wine);
    margin: 4px 0;
  }
  .date-bs {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;             /* was 13px */
    color: var(--gold-ink);
    margin-top: 6px;
  }

  /* portrait */
  .portrait-frame {
    position: relative;
    width: 64%;
    margin: 8px auto 14px;
    aspect-ratio: 3 / 4;
  }
  .portrait-arch {
    position: absolute;
    inset: 0;
    border-radius: 50% 50% 8px 8px / 35% 35% 8px 8px;
    overflow: hidden;
    background: var(--blush);
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    box-shadow:
      0 14px 30px -12px rgba(91,35,52,0.45),
      inset 0 0 0 5px var(--cream),
      inset 0 0 0 6px var(--gold);
  }
  .portrait-arch img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
  }
  .portrait-arch::after {
    content: '';
    position: absolute;
    inset: 0;
    /* plain translucent tint — NO mix-blend-mode (blend modes on an image
       inside a rotating 3D card flicker badly on iOS Safari) */
    background:
      linear-gradient(180deg, rgba(232,180,184,0.10) 0%, rgba(201,125,142,0.20) 100%);
    pointer-events: none;
  }

  /* countdown */
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 18px 2px 8px;
    width: 100%;
  }
  .cd-cell {
    background: linear-gradient(180deg, #fbe7e1 0%, #f4cfcf 100%);
    border-radius: 6px;
    padding: 14px 2px 10px;
    box-shadow:
      inset 0 0 0 1px rgba(201,169,110,0.45),
      0 4px 10px -6px rgba(91,35,52,0.25);
  }
  .cd-num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 1;
    color: var(--wine);
    font-variant-numeric: tabular-nums;
  }
  .cd-label {
    font-family: 'Cormorant SC', serif;
    font-size: 12px;             /* was 9px */
    letter-spacing: 0.2em;
    color: var(--wine);          /* darker */
    margin-top: 6px;
  }

  /* details */
  .detail-block { margin: 10px 0; }
  .detail-key {
    font-family: 'Cormorant SC', serif;
    font-size: 13px;             /* was 10px */
    letter-spacing: 0.35em;
    color: var(--gold-ink);
    margin-bottom: 2px;
  }
  .detail-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;             /* was 17px */
    font-weight: 500;
    color: var(--wine);
    line-height: 1.35;
  }
  .detail-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;             /* was 13px */
    color: var(--ink);
    margin-top: 1px;
  }

  .map-link {
    display: inline-block;
    margin-top: 14px;
    padding: 12px 26px;
    border: 1.5px solid var(--gold-ink);
    border-radius: 999px;
    font-family: 'Cormorant SC', serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    color: var(--wine);
    text-decoration: none;
    background: rgba(255,255,255,0.5);
    transition: all .3s ease;
  }
  .map-link:hover { background: var(--gold); color: var(--cream); }

  .signature {
    font-family: 'Pinyon Script', cursive;
    color: var(--wine);
    font-size: 36px;
    margin: 14px 0 4px;
  }

  /* page number */
  .page-num {
    position: absolute;
    bottom: 18px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Cormorant SC', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--gold-ink);
    opacity: 0.9;
  }

  /* ============= NAVIGATION (big + obvious) ============= */
  .book-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    /* opaque gradient — NO backdrop-filter (re-blurring the moving book
       behind it every frame is a major iOS Safari flicker source) */
    background: linear-gradient(180deg, rgba(253,246,240,0) 0%, rgba(253,246,240,0.96) 32%, #fdf6f0 70%);
  }
  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 52px;
    padding: 10px 22px;
    border-radius: 999px;
    border: 1.5px solid var(--wine);
    background: var(--cream);
    color: var(--wine);
    font-family: 'Cormorant SC', serif;
    font-size: 16px;
    letter-spacing: 0.18em;
    cursor: pointer;
    box-shadow: 0 4px 14px -6px rgba(91,35,52,0.35);
    transition: all .25s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:hover:not(:disabled) { background: var(--wine); color: var(--cream); }
  .nav-btn:active:not(:disabled) { transform: scale(0.96); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn.primary {
    background: var(--wine);
    color: #f3e3c2;
  }
  .nav-btn.primary:hover { background: var(--wine-deep); }
  .nav-btn svg { width: 18px; height: 18px; }

  .nav-dots {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .nav-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: rgba(91,35,52,0.22);
    border: none;
    padding: 0;
    cursor: pointer;
    transition: all .3s ease;
  }
  .nav-dot.active {
    background: var(--wine);
    transform: scale(1.35);
  }

  @media (max-width: 360px) {
    .nav-btn { padding: 10px 16px; font-size: 14px; }
    .book-nav { gap: 10px; }
  }

  /* ===== Loading splash: hides Babel-compile flash + font swap ===== */
  #cover-splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    background: radial-gradient(ellipse at 50% 38%, #fdf6f0 0%, #f7e9df 68%, #f1ddd0 100%);
    transition: opacity .7s ease;
  }
  #cover-splash.hide { opacity: 0; pointer-events: none; }
  .splash-ring {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(201,169,110,0.22);
    border-top-color: #c9a96e;
    animation: splashSpin 1s linear infinite;
  }
  @keyframes splashSpin { to { transform: rotate(360deg); } }
  .splash-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 30px;
    color: #5b2334;
  }
  .splash-sub {
    font-family: Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: #6f5526;
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#fdf6f0"/>
          <stop offset="100%" stop-color="#f5d4d4"/>
        </linearGradient>
      </defs>
      <rect width="400" height="400" fill="url(#bg)"/>
      <g transform="translate(130,110)">
        <rect width="140" height="180" rx="8" fill="#5b2334" stroke="#c9a96e" stroke-width="2"/>
        <rect x="10" y="10" width="120" height="160" rx="4" fill="none" stroke="#c9a96e" stroke-width="1"/>
        <circle cx="70" cy="118" r="20" fill="#a85267"/>
        <text x="70" y="124" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#fdf6f0">N♥P</text>
        <text x="70" y="60" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f3e3c2">N &amp; P</text>
      </g>
      <text x="200" y="330" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#5b2334">Neha &amp; Prajwal</text>
      <text x="200" y="354" text-anchor="middle" font-family="Georgia, serif" font-size="12" letter-spacing="3" fill="#6f5526">27 · JUNE · 2026</text>
    </svg>
  </template>

  <div class="ambient" id="ambient"></div>
  <div id="app"></div>

  <div id="cover-splash">
    <div class="splash-ring"></div>
    <div class="splash-name">Neha &amp; Prajwal</div>
    <div class="splash-sub">Wedding Invitation</div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="book.jsx"></script>

  <script>
    // Ambient floating hearts/petals
    (function() {
      const layer = document.getElementById('ambient');
      const HEARTS = 12;
      const heartSvg = (color) => `<svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M12 21s-7.5-4.7-9.5-9.5C1.3 8.2 3.4 4.5 6.8 4.5c2 0 3.5 1.1 5.2 3 1.7-1.9 3.2-3 5.2-3 3.4 0 5.5 3.7 4.3 7-2 4.8-9.5 9.5-9.5 9.5z" fill="${color}" opacity="0.85"/></svg>`;
      const petalSvg = (color) => `<svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M12 2 C 8 6, 6 12, 12 22 C 18 12, 16 6, 12 2 Z" fill="${color}" opacity="0.7"/></svg>`;
      const colors = ['#e8b4b8', '#c97d8e', '#f6d6d6', '#c9a96e'];
      for (let i = 0; i < HEARTS; i++) {
        const el = document.createElement('div');
        el.className = 'float';
        const size = 10 + Math.random() * 16;
        el.style.left = (Math.random() * 100) + 'vw';
        el.style.bottom = '-20px';
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.animationDuration = (14 + Math.random() * 16) + 's';
        el.style.animationDelay = (-Math.random() * 30) + 's';
        el.innerHTML = (i % 3 === 0) ? petalSvg(colors[i % colors.length]) : heartSvg(colors[i % colors.length]);
        layer.appendChild(el);
      }
    })();
  </script>
